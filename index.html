<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>
	<center>
		<h1 class="text-center text-dark">Object Classification</h1>

		<br><br>

		<h1 class="fw-light text-center">Smartphone</h1>
		<hr width="1500px">

		<h1 class="fw-light text-center">Water Bottle</h1>
		<hr  width="1500px">

		<hr  width="1500px">

		<h1 class="fw-light text-center">Watch</h1>

	<br><br><br><br>


	<h3 id="chead">Captured Photo</h3>
	<div id="pic1"></div>
	<br>
	<button class="btn btn-danger" id="cbtn" onclick="setup()">Identify</button>
